<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Image Compressor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <h1>Smart Image Compressor Tool</h1>

  <div class="top-controls">
    <label>Compression Level</label>

    <input type="range" id="qualityRange" min="10" max="90" value="60">

    <span id="qualityValue">60%</span>

    <button id="compressBtn">Compress</button>

    <button id="deleteBtn">Delete All</button>
  </div>

  <div class="upload-area">

    <div class="image-card" id="imageCard" style="display:none;">
      <img id="previewImage">

      <p id="oldSize"></p>
      <p id="newSize"></p>

      <a id="downloadBtn">Download</a>
    </div>

    <label class="upload-box">
      <input type="file" id="upload" accept="image/*" hidden>
      <span>Add Images</span>
    </label>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
<script src="script.js"></script>

</body>
</html>
